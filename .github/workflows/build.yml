name: Build OpenWRT Package

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex g++ gawk gcc-multilib \
          gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev wget

      - name: Clone OpenWRT
        run: |
          git clone https://github.com/openwrt/openwrt.git
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy package
        run: |
          cp -r $GITHUB_WORKSPACE/package/antidpi openwrt/package/

      - name: Prepare config
        run: |
          cd openwrt
          make defconfig

      - name: Build package
        run: |
          cd openwrt
          make package/antidpi/compile V=s

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: antidpi-ipk
          path: openwrt/bin/packages/**/antidpi*.ipk