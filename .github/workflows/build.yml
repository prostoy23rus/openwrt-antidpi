name: Build OpenWRT Package (SDK)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
        build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev \
        libssl-dev rsync unzip zlib1g-dev \
        file wget curl

    - name: Download OpenWRT SDK
      run: |
        wget https://downloads.openwrt.org/releases/23.05.3/targets/mediatek/filogic/openwrt-sdk-23.05.3-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz
        
        tar -xf openwrt-sdk-23.05.3-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz
        
        SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*")
        
        mv "$SDK_DIR" openwrt

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Copy package
      run: |
        cp -r $GITHUB_WORKSPACE/package/antidpi openwrt/package/

    - name: Configure build
      run: |
        cd openwrt
        make defconfig

    - name: Compile package
      run: |
        cd openwrt
        make package/antidpi/compile -j$(nproc) V=s

    - name: Upload IPK artifact
      uses: actions/upload-artifact@v4
      with:
        name: antidpi-ipk
        path: openwrt/bin/packages/*/*/antidpi*.ipk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Auto build ${{ github.run_number }}
        files: openwrt/bin/packages/*/*/antidpi*.ipk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}