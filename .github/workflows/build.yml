name: Build OpenWRT Package

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev python3 rsync unzip wget zlib1g-dev

      - name: Clone OpenWRT
        run: |
          git clone https://github.com/openwrt/openwrt.git
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy package
        run: |
          mkdir -p openwrt/package/custom 
          cp -r $GITHUB_WORKSPACE/package/antidpi openwrt/package/

      - name: Prepare config
        run: |
          cd openwrt
          echo "CONFIG_PACKAGE_antidpi=y" >> .config
          make defconfig

      - name: Compile package
        run: |
          cd openwrt
          make defconfig
          make package/index
          make package/custom/antidpi/compile V=s

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: antidpi-ipk
          path: openwrt/bin/packages/**/antidpi*.ipk