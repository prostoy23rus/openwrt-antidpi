name: Build OpenWRT Package

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
        build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev \
        libssl-dev rsync unzip zlib1g-dev \
        file wget gzip \
        libdeflate-tools libdeflate-dev

    - name: Clone OpenWRT
      run: |
        git clone https://github.com/openwrt/openwrt.git
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Copy package
      run: |
        cp -r $GITHUB_WORKSPACE/package/antidpi openwrt/package/

    - name: Prepare config
      run: |
        cd openwrt
        make defconfig

    - name: Compile package
      run: |
        cd openwrt
        make package/index
        make package/antidpi/compile -j$(nproc) V=s

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: antidpi-ipk
        path: openwrt/bin/packages/